function log(msg, tipo='ok') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${tipo}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function iniciarMigracao() {
  document.getElementById('btnMigrar').disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔥 Conectando ao Firebase...', 'info');

  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js');
    const { getFirestore, collection, doc, writeBatch, getDocs, deleteDoc } =
      await import('https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js');

    const app = initializeApp({
      apiKey: "AIzaSyBxEaAFt5TUu5kJFlk4EePNn3fpRzAckOY",
      authDomain: "espaco-bellartes.firebaseapp.com",
      projectId: "espaco-bellartes",
      storageBucket: "espaco-bellartes.firebasestorage.app",
      messagingSenderId: "343750357833",
      appId: "1:343750357833:web:24a90c163d04f18a836098"
    });
    const db = getFirestore(app);
    log('✅ Conectado!', 'ok');

    // Limpar coleções existentes
    log('\n🗑️  Limpando dados antigos...', 'info');
    for (const colNome of ['eventos', 'caixa']) {
      const snap = await getDocs(collection(db, colNome));
      for (const d of snap.docs) await deleteDoc(doc(db, colNome, d.id));
      log(`   Coleção "${colNome}" limpa (${snap.size} docs removidos)`, 'info');
    }

    // Subir eventos
    log('\n📅 Enviando eventos...', 'info');
    const b1 = writeBatch(db);
    eventos.forEach(e => {
      const {id, ...rest} = e;
      b1.set(doc(collection(db, 'eventos')), {...rest, id});
    });
    await b1.commit();
    log(`✅ ${eventos.length} eventos enviados com sucesso!`, 'ok');

    // Subir caixa em lotes de 500 (limite do Firestore)
    log('\n💰 Enviando fluxo de caixa...', 'info');
    const b2 = writeBatch(db);
    caixa.forEach(c => {
      b2.set(doc(collection(db, 'caixa')), c);
    });
    await b2.commit();
    log(`✅ ${caixa.length} lançamentos enviados com sucesso!`, 'ok');

    log('\n🎉 MIGRAÇÃO CONCLUÍDA!', 'ok');
    log('Pode fechar esta página e abrir o painel normalmente.', 'ok');
    log('\n👉 Link do painel: seu-usuario.github.io/bellartes', 'info');

    document.getElementById('btnMigrar').textContent = '✅ Concluído!';

  } catch(err) {
    log('\n❌ ERRO: ' + err.message, 'err');
    log('Verifique as regras do Firestore e tente novamente.', 'err');
    document.getElementById('btnMigrar').disabled = false;
    document.getElementById('btnMigrar').textContent = '🔄 Tentar novamente';
  }
}
